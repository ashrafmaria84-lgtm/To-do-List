<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>To do List</title>

  <link rel="stylesheet" href="style.css">

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
</head>

<body>



  <div class="auth-container" id="authContainer">

    <div class="glass-card auth-box">

      <div class="logo">
        <i class="fa-solid fa-layer-group"></i>
        <h1>To do List</h1>
      </div>

      <div class="tabs">

        <button class="tab active" id="loginTab">
          Login
        </button>

        <button class="tab" id="signupTab">
          Sign Up
        </button>

      </div>

   

      <form id="loginForm">

        <input type="email"
          id="loginEmail"
          placeholder="Email"
          required>

        <input type="password"
          id="loginPassword"
          placeholder="Password"
          required>

        <button type="submit" class="main-btn">
          Login
        </button>

      </form>

   

      <form id="signupForm" class="hidden">

        <input type="text"
          id="signupName"
          placeholder="Full Name"
          required>

        <input type="email"
          id="signupEmail"
          placeholder="Email"
          required>

        <input type="password"
          id="signupPassword"
          placeholder="Password"
          required>

        <button type="submit" class="main-btn">
          Create Account
        </button>

      </form>

    </div>

  </div>


  <div class="dashboard hidden" id="dashboard">

   

    <aside class="sidebar glass-card">

      <div>

        <div class="sidebar-top">

          <div class="logo small">
            <i class="fa-solid fa-layer-group"></i>
            <h2>To do List</h2>
          </div>

          <button class="theme-btn" id="themeToggle">
            <i class="fa-solid fa-moon"></i>
          </button>

        </div>

        

        <div class="menu">

          <div class="menu-item active" id="dashboardBtn">
            <i class="fa-solid fa-house"></i>
            <span>To do List</span>
          </div>

          <div class="menu-item" id="tasksBtn">
            <i class="fa-solid fa-list-check"></i>
            <span>Tasks</span>
          </div>

          <div class="menu-item" id="statsBtn">
            <i class="fa-solid fa-chart-simple"></i>
            <span>Statistics</span>
          </div>

          <div class="menu-item" id="notesBtn">
            <i class="fa-solid fa-note-sticky"></i>
            <span>Notes</span>
          </div>

        </div>

      </div>

      <button class="logout-btn" id="logoutBtn">
        <i class="fa-solid fa-right-from-bracket"></i>
        Logout
      </button>

    </aside>



    <main class="main-content">

  

      <div class="topbar">

        <div>
          <h1>Dream Maker</h1>
          <p>Manage your daily tasks beautifully ✨</p>
        </div>

        <div class="search-box">

          <i class="fa-solid fa-search"></i>

          <input type="text"
            id="searchInput"
            placeholder="Search tasks...">

        </div>

      </div>

     

      <div class="stats-grid" id="statsSection">

        <div class="stat-card glass-card">

          <i class="fa-solid fa-list"></i>

          <h2 id="totalTasks">0</h2>

          <p>Total Tasks</p>

        </div>

        <div class="stat-card glass-card">

          <i class="fa-solid fa-circle-check"></i>

          <h2 id="completedTasks">0</h2>

          <p>Completed</p>

        </div>

        <div class="stat-card glass-card">

          <i class="fa-solid fa-clock"></i>

          <h2 id="pendingTasks">0</h2>

          <p>Pending</p>

        </div>

      </div>

  

      <div class="glass-card task-form">

        <h2>Add New Task</h2>

        <input type="text"
          id="taskTitle"
          placeholder="Task Title">

        <textarea id="taskDescription"
          placeholder="Task Description"></textarea>

        <input type="date"
          id="taskDate">

        <input type="number"
          id="taskHours"
          placeholder="Hours Needed">

        <button id="addTaskBtn" class="main-btn">
          Add Task
        </button>

      </div>


      <div class="filter-section">

        <button class="filter-btn active"
          data-filter="all">
          All
        </button>

        <button class="filter-btn"
          data-filter="completed">
          Completed
        </button>

        <button class="filter-btn"
          data-filter="pending">
          Pending
        </button>

      </div>



      <div class="task-list"
        id="taskList"></div>

     

      <div class="glass-card notes-section hidden"
        id="notesSection">

        <h2>Quick Notes</h2>

        <textarea id="noteInput"
          placeholder="Write your notes here..."></textarea>

        <button class="main-btn"
          id="saveNoteBtn">

        

        </button>

      </div>

    </main>

  </div>

  <script src="style.js"></script>

</body>

</html>
